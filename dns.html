<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS 描述文件下载</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.6; max-width: 500px; margin: 0 auto; background: #f4f4f9; color: #333; }
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; font-size: 1.4rem; text-align: center; color: #007aff; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; -webkit-appearance: none; }
        button { width: 100%; padding: 15px; background-color: #007aff; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:active { background-color: #0056b3; }
        .hint { font-size: 0.85rem; color: #888; margin-top: 15px; background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        /* 微信提醒样式 */
        #wechat-mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; text-align: right; padding: 20px; box-sizing: border-box; z-index: 100; }
    </style>
</head>
<body>

<!-- 微信环境提醒 -->
<div id="wechat-mask" onclick="this.style.display='none'">
    <p style="font-size: 1.2rem;">⬆️ 点击右上角<br>选择“在 Safari 中打开”</p>
</div>

<div class="card">
    <h2>DNS 配置生成器</h2>
    
    <div class="form-group">
        <label>加密协议</label>
        <select id="protocol" onchange="updateUI()">
            <option value="TLS">DNS over TLS (DoT)</option>
            <option value="HTTPS">DNS over HTTPS (DoH)</option>
        </select>
    </div>

    <div class="form-group">
        <label id="labelAddress">DoT 域名</label>
        <input type="text" id="address" value="dns.y57.top">
    </div>

    <button onclick="handleDownload()">立即下载并安装</button>

    <div class="hint">
        <strong>安装步骤：</strong><br>
        1. 点击下载，弹出提示时选择“允许”。<br>
        2. 提示“已下载描述文件”后，关闭浏览器。<br>
        3. 打开手机 <b>设置</b> -> <b>已下载描述文件</b>。<br>
        4. 点击右上角 <b>安装</b> 即可生效。
    </div>
</div>

<script>
    // 检查是否在微信/QQ中
    function isWechatOrQQ() {
        const ua = navigator.userAgent.toLowerCase();
        return (ua.indexOf('micromessenger') !== -1) || (ua.indexOf('mqqbrowser') !== -1);
    }

    if (isWechatOrQQ()) {
        document.getElementById('wechat-mask').style.display = 'block';
    }

    function updateUI() {
        const protocol = document.getElementById('protocol').value;
        const label = document.getElementById('labelAddress');
        const input = document.getElementById('address');
        if (protocol === 'HTTPS') {
            label.innerText = 'DoH 完整地址 (URL)';
            input.value = 'https://dns.y57.top/dns-query';
        } else {
            label.innerText = 'DoT 域名 (ServerName)';
            input.value = 'dns.y57.top';
        }
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16).toUpperCase();
        });
    }

    function handleDownload() {
        const protocol = document.getElementById('protocol').value;
        const address = document.getElementById('address').value.trim();
        
        if (!address) return alert('请输入地址');

        const pUUID = generateUUID();
        const tUUID = generateUUID();
        const identifier = "com.dns.custom." + Date.now();

        let dnsDict = '';
        if (protocol === 'TLS') {
            dnsDict = `<key>DNSSettings</key><dict>
                <key>DNSProtocol</key><string>TLS</string>
                <key>ServerName</key><string>${address}</string>
            </dict>`;
        } else {
            dnsDict = `<key>DNSSettings</key><dict>
                <key>DNSProtocol</key><string>HTTPS</string>
                <key>ServerURL</key><string>${address}</string>
            </dict>`;
        }

        const xml = `<?xml version="1.0" encoding="UTF-8"?>

<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            ${dnsDict}
            <key>OnDemandEnabled</key><integer>1</integer>
            <key>OnDemandRules</key><array><dict><key>Action</key><string>Connect</string></dict></array>
            <key>PayloadDescription</key><string>Configures DNS</string>
            <key>PayloadDisplayName</key><string>DNS ${protocol}</string>
            <key>PayloadIdentifier</key><string>${identifier}.sub</string>
            <key>PayloadType</key><string>com.apple.dnsSettings.managed</string>
            <key>PayloadUUID</key><string>${pUUID}</string>
            <key>PayloadVersion</key><integer>1</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key><string>DNS-${address}</string>
    <key>PayloadIdentifier</key><string>${identifier}</string>
    <key>PayloadRemovalDisallowed</key><false/>
    <key>PayloadType</key><string>Configuration</string>
    <key>PayloadUUID</key><string>${tUUID}</string>
    <key>PayloadVersion</key><integer>1</integer>
</dict>
</plist>`;
