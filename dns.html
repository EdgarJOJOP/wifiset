<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS DNS 描述文件生成器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f5f5f7; color: #1d1d1f; line-height: 1.5; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #0071e3; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0077ed; }
        .note { font-size: 12px; color: #86868b; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>DNS 配置生成</h2>
    
    <div class="form-group">
        <label for="protocol">协议类型</label>
        <select id="protocol">
            <option value="TLS">DNS over TLS (DoT)</option>
            <option value="HTTPS">DNS over HTTPS (DoH)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="domain">服务器域名</label>
        <input type="text" id="domain" placeholder="例如: dns.y57.top" value="dns.y57.top">
    </div>

    <button onclick="generateConfig()">生成并下载描述文件</button>

    <div class="note">
        下载后，请前往“设置”->“已下载描述文件”进行安装。<br>
        iOS 14+ / macOS Big Sur+ 适用。
    </div>
</div>

<script>
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16).toUpperCase();
        });
    }

    function generateConfig() {
        const domain = document.getElementById('domain').value.trim();
        const protocol = document.getElementById('protocol').value;
        
        if (!domain) {
            alert("请输入有效的域名");
            return;
        }

        const uuid1 = generateUUID();
        const uuid2 = generateUUID();
        const identifier = "com.apple.dnsSettings.managed." + uuid1.toLowerCase();
        
        // 如果是 HTTPS，通常需要 ServerURL 字段，这里默认拼接 https://domain/dns-query
        let dnsSettings = '';
        if (protocol === 'TLS') {
            dnsSettings = `
                <key>DNSSettings</key>
                <dict>
                    <key>DNSProtocol</key>
                    <string>TLS</string>
                    <key>ServerName</key>
                    <string>${domain}</string>
                </dict>`;
        } else {
            dnsSettings = `
                <key>DNSSettings</key>
                <dict>
                    <key>DNSProtocol</key>
                    <string>HTTPS</string>
                    <key>ServerName</key>
                    <string>${domain}</string>
                    <key>ServerURL</key>
                    <string>https://${domain}/dns-query</string>
                </dict>`;
        }

        const configXml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>PayloadContent</key>
	<array>
		<dict>
			${dnsSettings}
			<key>OnDemandEnabled</key>
			<integer>1</integer>
			<key>OnDemandRules</key>
			<array>
				<dict>
					<key>Action</key>
					<string>Connect</string>
				</dict>
			</array>
			<key>PayloadDescription</key>
			<string>配置设备使用加密 DNS (${protocol})</string>
			<key>PayloadDisplayName</key>
			<string>${domain} ${protocol}</string>
			<key>PayloadIdentifier</key>
			<string>${identifier}</string>
			<key>PayloadType</key>
			<string>com.apple.dnsSettings.managed</string>
			<key>PayloadUUID</key>
			<string>${uuid1}</string>
			<key>PayloadVersion</key>
			<integer>1</integer>
		</dict>
	</array>
	<key>PayloadDescription</key>
	<string>通过描述文件配置加密 DNS 路由</string>
	<key>PayloadDisplayName</key>
	<string>${domain} ${protocol}</string>
	<key>PayloadIdentifier</key>
	<string>${uuid2}</string>
	<key>PayloadRemovalDisallowed</key>
	<false/>
	<key>PayloadScope</key>
	<string>System</string>
	<key>PayloadType</key>
	<string>Configuration</string>
	<key>PayloadUUID</key>
	<string>${uuid2}</string>
	<key>PayloadVersion</key>
	<integer>1</integer>
</dict>
</plist>`;

        const blob = new Blob
